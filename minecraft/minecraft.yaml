apiVersion: v1
kind: Pod
metadata:
  name: minecraft
spec:
  containers:
    - name: fabric
      image: itzg/minecraft-server
      ports:
        - containerPort: 25565
      env:
        - EULA: true
        - MODRINTH_MODPACK: "BYN9yKrV"
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: minecraft
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9376
---
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
