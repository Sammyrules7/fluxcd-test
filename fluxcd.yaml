apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 1m0s
  ref:
    branch: Main
  url: https://github.com/sammyrules7/fluxcd-test
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minecraft
  namespace: minecraft
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: minecraft
  path: ./minecraft
  prune: true
---
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
